name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Reject manual generated changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if git diff --name-only "$BASE_SHA"...HEAD | grep -q '^straw/v1/straw\.pb\.go$'; then
            case "$HEAD_REF" in automation/protos-*) ;; *) echo 'generated files may only change through automation'; exit 1;; esac
          fi
      - run: make check

