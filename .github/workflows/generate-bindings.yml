name: Generate bindings

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Exact straw-protos tag
        required: true
        type: string
      source_sha:
        description: Commit resolved by the source tag
        required: true
        type: string

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.STRAW_RELEASE_APP_ID }}
          private-key: ${{ secrets.STRAW_RELEASE_APP_PRIVATE_KEY }}
          owner: beremaran
          repositories: straw-protos,straw-protos-go
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: binding
          fetch-depth: 0
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: beremaran/straw-protos
          ref: ${{ inputs.source_tag }}
          token: ${{ steps.app-token.outputs.token }}
          path: source
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: binding/go.mod
          cache-dependency-path: binding/go.sum
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: 1.50.0
      - name: Verify source and generate twice
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          test "$(git -C source rev-list -n 1 "$SOURCE_TAG")" = "$SOURCE_SHA"
          test "$(git -C source rev-parse HEAD)" = "$SOURCE_SHA"
          GOBIN="$RUNNER_TEMP/bin" go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          export PATH="$RUNNER_TEMP/bin:$PATH"
          cd binding
          buf generate ../source --template buf.gen.yaml
          first=$(shasum -a 256 straw/v1/straw.pb.go)
          buf generate ../source --template buf.gen.yaml
          test "$first" = "$(shasum -a 256 straw/v1/straw.pb.go)"
          jq -n \
            --arg tag "$SOURCE_TAG" --arg source "$SOURCE_SHA" --arg config "${{ github.sha }}" \
            '{source_repository:"github.com/beremaran/straw-protos",source_tag:$tag,source_commit:$source,generator:"protoc-gen-go",generator_version:"v1.36.10",buf_version:"1.50.0",generation_config_revision:$config,generated_repository_commit:"pending",reproducibility:"generated twice identically and tests passed",generated_code_notice:"straw/v1/straw.pb.go is generated; do not edit manually"}' > PROVENANCE.json
          go mod tidy
          make check
      - name: Open generated pull request
        working-directory: binding
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          branch="automation/protos-${SOURCE_TAG#v}"
          git config user.name 'Straw Release Automation[bot]'
          git config user.email 'straw-release-automation[bot]@users.noreply.github.com'
          git switch -c "$branch"
          git add straw/v1/straw.pb.go PROVENANCE.json go.mod go.sum
          git commit -m "Generate bindings from $SOURCE_TAG"
          git push -u origin "$branch"
          gh pr create --title "Generate bindings from $SOURCE_TAG" --body "Generated from exact private protocol tag $SOURCE_TAG. Provenance, reproducibility, and tests are recorded in PROVENANCE.json. Generated files must not be edited manually." --base main --head "$branch"
