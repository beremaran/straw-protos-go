name: Release matching binding

on:
  push:
    branches: [main]
    paths: [PROVENANCE.json]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.STRAW_RELEASE_APP_ID }}
          private-key: ${{ secrets.STRAW_RELEASE_APP_PRIVATE_KEY }}
          owner: beremaran
          repositories: straw-protos-go,straw-sdk-go,straw-oss
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Validate provenance and release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          tag=$(jq -r .source_tag PROVENANCE.json)
          source_sha=$(jq -r .source_commit PROVENANCE.json)
          test -n "$tag"
          test "$tag" != null
          test "$(jq -r .reproducibility PROVENANCE.json)" = 'generated twice identically and tests passed'
          make check
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "$tag")" = "$GITHUB_SHA"
          else
            git tag "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            existing=$(gh release view "$tag" --json body --jq .body)
            printf '%s' "$existing" | grep -q "$source_sha"
          else
            gh release create "$tag" --title "$tag" --notes "Generated code. Source straw-protos tag: $tag; source commit: $source_sha; generator: protoc-gen-go v1.36.10; Buf: 1.50.0; reproducibility and tests: passed; generated repository commit: $GITHUB_SHA."
          fi
          for repo in straw-sdk-go straw-oss; do
            gh api "repos/beremaran/$repo/dispatches" -f event_type=go-binding-release -F "client_payload[tag]=$tag"
          done
